# MySQL Profile Configuration
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MySQL specific JPA settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Silence Hibernate logs for this profile
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# Session Management & Cookie Security
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# CSRF Logging (Optional, for debugging)
# logging.level.org.springframework.security.web.csrf.CsrfFilter=DEBUG
