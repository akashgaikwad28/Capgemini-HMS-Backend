<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>On-Call Shifts — HMS</title></head>
<body>
<section class="p-8 min-h-screen">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h2 class="text-3xl font-extrabold tracking-tight text-on-surface font-headline">On-Call Shifts</h2>
            <p class="text-on-surface-variant mt-1">Assign and track nurse on-call coverage for ward blocks.</p>
        </div>
        <button onclick="openModal()" data-admin-only class="inline-flex items-center gap-2 px-5 py-3 bg-primary text-white font-semibold rounded-xl hover:bg-sky-700 transition-all active:scale-95 shadow-lg shadow-primary/20 text-sm">
            <span class="material-symbols-outlined">add</span> Assign Shift
        </button>
    </div>

    <!-- Lookup Panel -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <!-- By Nurse -->
        <div class="bg-surface-container-low rounded-xl p-4 flex items-center gap-3 flex-wrap">
            <span class="material-symbols-outlined text-outline">personal_injury</span>
            <p class="text-sm font-medium text-on-surface-variant">By Nurse ID:</p>
            <input id="nurse-id" type="number" placeholder="501" class="px-3 py-2 bg-white border border-outline-variant/30 rounded-lg text-sm outline-none focus:ring-2 focus:ring-primary/20 w-28"/>
            <button onclick="lookupNurse()" class="px-4 py-2 bg-primary text-white text-sm font-semibold rounded-lg hover:bg-sky-700">View Shifts</button>
        </div>
        <!-- By Block -->
        <div class="bg-surface-container-low rounded-xl p-4 flex items-center gap-3 flex-wrap">
            <span class="material-symbols-outlined text-outline">meeting_room</span>
            <p class="text-sm font-medium text-on-surface-variant">By Block:</p>
            <input id="block-floor" type="number" placeholder="Floor" class="px-3 py-2 bg-white border border-outline-variant/30 rounded-lg text-sm outline-none focus:ring-2 focus:ring-primary/20 w-20"/>
            <input id="block-code" type="number" placeholder="Code" class="px-3 py-2 bg-white border border-outline-variant/30 rounded-lg text-sm outline-none focus:ring-2 focus:ring-primary/20 w-20"/>
            <button onclick="lookupBlock()" class="px-4 py-2 bg-secondary text-white text-sm font-semibold rounded-lg hover:opacity-80">View Coverage</button>
        </div>
    </div>

    <!-- Results -->
    <div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm">
        <div class="px-6 py-4 border-b border-surface-container-low">
            <p class="text-sm font-semibold text-outline" id="table-label">Use a lookup above to view shifts.</p>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-surface-container-low/50">
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Nurse ID</th>
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Floor</th>
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Block</th>
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Shift Start</th>
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Shift End</th>
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Duration</th>
                    </tr>
                </thead>
                <tbody id="shift-tbody">
                    <tr><td colspan="6" class="px-6 py-8 text-center text-outline text-sm">No data.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Assign Shift Modal -->
    <div id="modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/20 backdrop-blur-sm">
        <div class="bg-surface-container-lowest w-full max-w-md rounded-2xl shadow-2xl p-8 m-4">
            <div class="flex justify-between items-start mb-6">
                <h3 class="text-xl font-extrabold text-on-surface font-headline">Assign On-Call Shift</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-surface-container-low rounded-full"><span class="material-symbols-outlined text-outline">close</span></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-semibold text-outline uppercase tracking-wider">Nurse *</label>
                    <select id="f-nurse" class="field-input mt-1">
                        <option value="">— Select Nurse —</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-semibold text-outline uppercase tracking-wider">Block Floor *</label>
                        <input id="f-floor" type="number" placeholder="1" class="field-input mt-1"/>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-outline uppercase tracking-wider">Block Code *</label>
                        <input id="f-code" type="number" placeholder="1" class="field-input mt-1"/>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-semibold text-outline uppercase tracking-wider">Shift Start *</label>
                        <input id="f-start" type="datetime-local" class="field-input mt-1"/>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-outline uppercase tracking-wider">Shift End *</label>
                        <input id="f-end" type="datetime-local" class="field-input mt-1"/>
                    </div>
                </div>
                <div id="modal-err" class="hidden text-error text-sm bg-error-container rounded-lg px-3 py-2"></div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeModal()" class="flex-1 py-3 bg-surface-container-high text-on-surface-variant font-bold rounded-xl text-sm">Cancel</button>
                    <button onclick="saveShift()" id="save-btn" class="flex-[2] py-3 bg-primary text-white font-bold rounded-xl hover:bg-sky-700 active:scale-95 text-sm shadow-lg shadow-primary/20">Assign Shift</button>
                </div>
            </div>
        </div>
    </div>

    <style>
    .field-input { display:block; width:100%; padding:0.6rem 0.875rem; background:#f3f4f5; border:none; border-radius:0.75rem; font-size:0.875rem; outline:none; }
    .field-input:focus { background:#fff; box-shadow:0 0 0 2px rgba(0,99,151,0.15); }
    </style>

    <script>
    function fmtDt(dt) { return dt ? new Date(dt).toLocaleString('en-IN', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—'; }
    function duration(s, e) {
        if (!s || !e) return '—';
        const ms = new Date(e) - new Date(s);
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        return h + 'h ' + m + 'm';
    }

    function renderShifts(shifts) {
        const tbody = document.getElementById('shift-tbody');
        if (!shifts || !shifts.length) { tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-outline text-sm">No shifts found.</td></tr>'; return; }
        tbody.innerHTML = shifts.map(s => 
            '<tr class="hover:bg-primary-fixed/20 transition-colors">' +
                '<td class="px-6 py-4 text-sm font-medium text-primary">' + s.nurseId + '</td>' +
                '<td class="px-6 py-4 text-sm text-on-surface-variant">Floor ' + s.blockFloor + '</td>' +
                '<td class="px-6 py-4 text-sm text-on-surface-variant">Block ' + s.blockCode + '</td>' +
                '<td class="px-6 py-4 text-sm text-on-surface">' + fmtDt(s.onCallStart) + '</td>' +
                '<td class="px-6 py-4 text-sm text-on-surface">' + fmtDt(s.onCallEnd) + '</td>' +
                '<td class="px-6 py-4"><span class="px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full text-xs font-bold">' + duration(s.onCallStart, s.onCallEnd) + '</span></td>' +
            '</tr>').join('');
    }

    async function lookupNurse() {
        const id = document.getElementById('nurse-id').value;
        if (!id) { showToast('Enter a nurse ID.', 'warn'); return; }
        document.getElementById('table-label').textContent = 'Shifts for Nurse ID: ' + id;
        document.getElementById('shift-tbody').innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-outline text-sm">Loading…</td></tr>';
        try {
            const res = await apiFetch('/api/v1/shifts/nurse/' + id);
            if (res && res.data) {
                renderShifts(res.data);
            }
        } catch (e) {
            console.error(e);
        }
    }

    async function lookupBlock() {
        const floor = document.getElementById('block-floor').value;
        const code = document.getElementById('block-code').value;
        if (!floor || !code) { showToast('Enter both floor and block code.', 'warn'); return; }
        document.getElementById('table-label').textContent = 'Coverage for Floor ' + floor + ', Block ' + code;
        document.getElementById('shift-tbody').innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-outline text-sm">Loading…</td></tr>';
        try {
            const res = await apiFetch('/api/v1/shifts/block/' + floor + '/' + code);
            if (res && res.data) {
                renderShifts(res.data);
            }
        } catch (e) {
            console.error(e);
        }
    }

    function openModal() {
        ['f-nurse','f-floor','f-code','f-start','f-end'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('modal-err').classList.add('hidden');
        document.getElementById('modal').classList.replace('hidden','flex');
    }

    function closeModal() { document.getElementById('modal').classList.replace('flex','hidden'); }

    async function saveShift() {
        const errEl = document.getElementById('modal-err'); errEl.classList.add('hidden');
        const payload = {
            nurseId: parseInt(document.getElementById('f-nurse').value),
            blockFloor: parseInt(document.getElementById('f-floor').value),
            blockCode: parseInt(document.getElementById('f-code').value),
            onCallStart: document.getElementById('f-start').value || null,
            onCallEnd: document.getElementById('f-end').value || null
        };
        if (!payload.nurseId || !payload.blockFloor || !payload.blockCode || !payload.onCallStart || !payload.onCallEnd) {
            errEl.textContent = 'All fields are required.'; errEl.classList.remove('hidden'); return;
        }
        const btn = document.getElementById('save-btn'); btn.disabled = true;
        try {
            const res = await apiFetch('/api/v1/shifts', { method: 'POST', body: JSON.stringify(payload) });
            if (res && res.success) {
                showToast('Shift assigned!');
                closeModal();
            } else if (res) {
                errEl.textContent = res.message || 'Error.'; errEl.classList.remove('hidden');
            }
        } catch(e) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
        finally { btn.disabled = false; }
    }
    applyRoleVisibility();
    buildNurseDropdown('f-nurse');
    </script>
</section>
