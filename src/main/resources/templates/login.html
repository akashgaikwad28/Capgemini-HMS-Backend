<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clinical Precision HMS</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                "colors": {
                        "secondary-fixed-dim": "#abcae8",
                        "secondary-container": "#c1e0ff",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#004b73",
                        "on-primary-container": "#002d47",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#001d31",
                        "on-secondary-container": "#46647e",
                        "surface-container-high": "#e7e8e9",
                        "tertiary-fixed-dim": "#ffba4b",
                        "on-secondary-fixed": "#001d31",
                        "on-tertiary-container": "#3c2500",
                        "inverse-surface": "#2e3132",
                        "on-tertiary-fixed-variant": "#624000",
                        "on-surface": "#191c1d",
                        "primary": "#006397",
                        "surface-variant": "#e1e3e4",
                        "on-surface-variant": "#3f4850",
                        "background": "#f8f9fa",
                        "tertiary-fixed": "#ffddb1",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "secondary-fixed": "#cce5ff",
                        "inverse-primary": "#92ccff",
                        "surface": "#f8f9fa",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#291800",
                        "surface-container-low": "#f3f4f5",
                        "on-error": "#ffffff",
                        "secondary": "#43617c",
                        "error": "#ba1a1a",
                        "on-background": "#191c1d",
                        "surface-tint": "#006397",
                        "outline-variant": "#bfc7d2",
                        "outline": "#707881",
                        "inverse-on-surface": "#f0f1f2",
                        "on-error-container": "#93000a",
                        "primary-container": "#3498db",
                        "tertiary": "#815600",
                        "tertiary-container": "#c48400",
                        "surface-dim": "#d9dadb",
                        "on-secondary-fixed-variant": "#2b4a63",
                        "primary-fixed": "#cce5ff",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container": "#edeeef",
                        "primary-fixed-dim": "#92ccff",
                        "on-tertiary": "#ffffff"
                },
                "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                },
                "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                }
              },
            },
          }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .font-headline { font-family: 'Manrope', sans-serif; }
        
        /* Spinner CSS */
        .spinner {
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex items-center justify-center">

    <!-- Auth Wrapper -->
    <div class="w-full max-w-md p-8 bg-surface-container-lowest rounded-2xl shadow-xl shadow-sky-900/10 border border-surface-container-low">
        
        <div class="text-center mb-8">
            <div class="inline-flex justify-center items-center bg-primary/10 rounded-2xl mb-4 w-16 h-16 text-primary shadow-inner">
                <span class="material-symbols-outlined text-[32px]" data-icon="health_and_safety">health_and_safety</span>
            </div>
            <h1 class="text-2xl font-extrabold text-sky-900 tracking-tight font-headline">Clinical Precision</h1>
            <p class="text-on-surface-variant text-sm mt-1 font-medium">Sign in to securely access the system.</p>
        </div>
        
        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">
            <!-- Email -->
            <div class="relative group">
                <input type="email" id="email" class="peer block w-full bg-surface-container-low border border-transparent rounded-xl px-4 pt-6 pb-2 text-sm text-on-surface focus:bg-surface-container-lowest focus:border-primary/30 focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder=" " required>
                <label for="email" class="absolute left-4 top-4 text-outline-variant duration-150 transform -translate-y-3 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-primary pointer-events-none">
                    Email Address
                </label>
            </div>
            
            <!-- Password -->
            <div class="relative group">
                <input type="password" id="password" class="peer block w-full bg-surface-container-low border border-transparent rounded-xl px-4 pt-6 pb-2 text-sm text-on-surface focus:bg-surface-container-lowest focus:border-primary/30 focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder=" " required>
                <label for="password" class="absolute left-4 top-4 text-outline-variant duration-150 transform -translate-y-3 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-primary pointer-events-none">
                    Password
                </label>
            </div>
            
            <div class="pt-2">
                <button type="submit" id="loginBtn" class="w-full py-3 bg-gradient-to-r from-primary to-primary-container text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] transition-transform flex items-center justify-center gap-2">
                    <span id="loginText">Sign In</span>
                    <div id="loginSpinner" class="spinner hidden"></div>
                </button>
            </div>
            
            <div class="text-center pt-2">
                <a href="#" class="text-sm font-semibold text-primary hover:underline">Forgot your password?</a>
            </div>
        </form>
    </div>

    <!-- Custom JS -->
    <script th:src="@{/js/main.js}"></script>
    
    <!-- Dynamic Toast Container -->
    <div id="toast-container" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2"></div>
    
    <script>
        // Custom Tailwind Toast Override
        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            
            const toast = document.createElement('div');
            // Tailwind styling mapping
            let bgClass = type === 'success' ? 'bg-secondary-container text-on-secondary-container' : 
                          type === 'danger' ? 'bg-error-container text-error' : 
                          'bg-inverse-surface text-inverse-on-surface';
            
            let icon = type === 'success' ? 'check_circle' : type === 'danger' ? 'error' : 'info';
            
            toast.className = `flex items-center gap-3 px-6 py-4 rounded-xl shadow-2xl transition-all duration-300 transform translate-y-10 opacity-0 ${bgClass}`;
            toast.innerHTML = `
                <span class="material-symbols-outlined">${icon}</span>
                <p class="text-sm font-bold">${message}</p>
            `;
            
            container.appendChild(toast);
            
            // Animate in
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);
            
            // Auto remove
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loginSpinner');
            const btnText = document.getElementById('loginText');
            
            // Set loading state
            btn.disabled = true;
            btnText.textContent = "Authenticating";
            spinner.classList.remove('hidden');
            
            try {
                // Simulate network latency
                await new Promise(resolve => setTimeout(resolve, 800));
                
                // Hardcoded demo logic based on requirements
                const dummyToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummyPatientToken';
                localStorage.setItem('hms_jwt_token', dummyToken);
                
                showToast('Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/', 1000);
                
            } catch (error) {
                showToast(error.message || 'Login failed, please try again.', 'danger');
            } finally {
                if(!btn.disabled) { // Only reset if not redirecting
                    btn.disabled = false;
                    btnText.textContent = "Sign In";
                    spinner.classList.add('hidden');
                }
            }
        }
    </script>
</body>
</html>
