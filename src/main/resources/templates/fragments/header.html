<!-- templates/fragments/header.html -->
<header th:fragment="header" class="flex justify-between items-center h-16 px-8 bg-white/80 backdrop-blur-md sticky top-0 z-40 shadow-sm shadow-sky-900/5">
    <div class="flex items-center flex-1 max-w-xl">
        <div class="relative w-full group">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-sky-600 transition-colors">search</span>
            <input id="global-search" class="w-full pl-10 pr-4 py-2 bg-slate-50 border-none rounded-xl text-sm focus:ring-2 focus:ring-sky-500/20 transition-all outline-none" placeholder="Search patients, physicians..." type="text"/>
        </div>
    </div>
    <div class="flex items-center gap-3 ml-6">
        <span class="text-xs font-medium text-outline px-3 py-1 bg-surface-container rounded-full" 
              sec:authentication="principal.authorities[0].authority"
              id="header-role-badge"></span>
        
        <form th:action="@{/logout}" method="POST" class="inline">
            <button type="submit" class="flex items-center gap-1 px-3 py-1.5 text-sm text-outline hover:text-error hover:bg-error-container/30 rounded-lg transition-colors font-medium">
                <span class="material-symbols-outlined text-base">logout</span>Logout
            </button>
        </form>
    </div>
    <script>
        // Optional: Clean up ROLE_ prefix if needed visually
        document.addEventListener("DOMContentLoaded", function() {
            const el = document.getElementById('header-role-badge');
            if (el && el.textContent) {
                el.textContent = el.textContent.replace('ROLE_', '');
            }
        });
    </script>
</header>
