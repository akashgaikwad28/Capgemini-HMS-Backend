<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clinical Precision HMS</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                "colors": {
                        "secondary-fixed-dim": "#abcae8",
                        "secondary-container": "#c1e0ff",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#004b73",
                        "on-primary-container": "#002d47",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#001d31",
                        "on-secondary-container": "#46647e",
                        "surface-container-high": "#e7e8e9",
                        "tertiary-fixed-dim": "#ffba4b",
                        "on-secondary-fixed": "#001d31",
                        "on-tertiary-container": "#3c2500",
                        "inverse-surface": "#2e3132",
                        "on-tertiary-fixed-variant": "#624000",
                        "on-surface": "#191c1d",
                        "primary": "#006397",
                        "surface-variant": "#e1e3e4",
                        "on-surface-variant": "#3f4850",
                        "background": "#f8f9fa",
                        "tertiary-fixed": "#ffddb1",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "secondary-fixed": "#cce5ff",
                        "inverse-primary": "#92ccff",
                        "surface": "#f8f9fa",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#291800",
                        "surface-container-low": "#f3f4f5",
                        "on-error": "#ffffff",
                        "secondary": "#43617c",
                        "error": "#ba1a1a",
                        "on-background": "#191c1d",
                        "surface-tint": "#006397",
                        "outline-variant": "#bfc7d2",
                        "outline": "#707881",
                        "inverse-on-surface": "#f0f1f2",
                        "on-error-container": "#93000a",
                        "primary-container": "#3498db",
                        "tertiary": "#815600",
                        "tertiary-container": "#c48400",
                        "surface-dim": "#d9dadb",
                        "on-secondary-fixed-variant": "#2b4a63",
                        "primary-fixed": "#cce5ff",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container": "#edeeef",
                        "primary-fixed-dim": "#92ccff",
                        "on-tertiary": "#ffffff"
                },
                "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                },
                "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                }
              },
            },
          }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .font-headline { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-sky-50 via-white to-blue-50">

    <!-- Auth Wrapper -->
    <div class="w-full max-w-md p-8 bg-surface-container-lowest rounded-2xl shadow-xl shadow-sky-900/10 border border-surface-container-low">
        
        <div class="text-center mb-8">
            <div class="inline-flex justify-center items-center bg-primary/10 rounded-2xl mb-4 w-16 h-16 text-primary shadow-inner">
                <span class="material-symbols-outlined text-[32px]">health_and_safety</span>
            </div>
            <h1 class="text-2xl font-extrabold text-sky-900 tracking-tight font-headline">Clinical Precision</h1>
            <p class="text-on-surface-variant text-sm mt-1 font-medium">Sign in to securely access the system.</p>
        </div>
        
        <form id="loginForm" th:action="@{/login}" method="POST" class="space-y-5">
            <!-- Error Message -->
            <div th:if="${param.error}" class="p-4 rounded-xl bg-error-container text-error text-sm font-medium flex items-center gap-3 border border-error/10">
                <span class="material-symbols-outlined text-base">error</span>
                Invalid email or password.
            </div>

            <!-- Logout Message -->
            <div th:if="${param.logout}" class="p-4 rounded-xl bg-secondary-container text-on-secondary-container text-sm font-medium flex items-center gap-3 border border-secondary/10">
                <span class="material-symbols-outlined text-base">info_i</span>
                You have been successfully logged out.
            </div>

            <!-- Email (username) -->
            <div class="relative group">
                <input type="text" name="username" id="email" class="peer block w-full bg-surface-container-low border border-transparent rounded-xl px-4 pt-6 pb-2 text-sm text-on-surface focus:bg-surface-container-lowest focus:border-primary/30 focus:ring-4 focus:ring-primary/10 transition-all outline-none" placeholder=" " required>
                <label for="email" class="absolute left-4 top-4 text-outline duration-150 transform -translate-y-3 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-primary pointer-events-none font-bold text-[10px] uppercase tracking-wider">
                    Email Address or Username
                </label>
            </div>
            
            <!-- Password -->
            <div class="relative group">
                <input type="password" name="password" id="password" class="peer block w-full bg-surface-container-low border border-transparent rounded-xl px-4 pt-6 pb-2 text-sm text-on-surface focus:bg-surface-container-lowest focus:border-primary/30 focus:ring-4 focus:ring-primary/10 transition-all outline-none" placeholder=" " required>
                <label for="password" class="absolute left-4 top-4 text-outline duration-150 transform -translate-y-3 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-primary pointer-events-none font-bold text-[10px] uppercase tracking-wider">
                    Password
                </label>
            </div>
            
            <div class="pt-2">
                <button type="submit" id="loginBtn" class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-white font-bold rounded-xl shadow-lg shadow-primary/25 hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span>Sign In</span>
                    <span class="material-symbols-outlined text-lg">login</span>
                </button>
            </div>
            
            <div class="text-center pt-2 space-y-3">
                <p class="text-xs text-on-surface-variant">
                    Don't have an account? 
                    <a th:href="@{/register}" class="font-bold text-primary hover:underline">Register here</a>
                </p>
            </div>
        </form>
    </div>

    <script>
        // Cleanup legacy JWT auth data
        localStorage.clear();
        console.log("Session migration: Auth storage cleaned.");
    </script>
</body>
</html>
