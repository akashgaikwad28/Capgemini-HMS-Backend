<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — Clinical Precision HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align: middle; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-50 via-white to-blue-50 flex items-center justify-center p-4">

<div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-sky-600 text-white mb-4 shadow-lg shadow-sky-600/30">
            <span class="material-symbols-outlined text-3xl">local_hospital</span>
        </div>
        <h1 class="text-3xl font-extrabold text-sky-900 font-headline">Clinical Precision</h1>
        <p class="text-slate-500 mt-1 text-sm">Hospital Management System</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl shadow-sky-900/8 p-8">
        <h2 class="text-xl font-bold text-slate-800 font-headline mb-6">Sign in to your account</h2>

        <div id="error-banner" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm flex items-center gap-2">
            <span class="material-symbols-outlined text-base">error</span>
            <span id="error-text">Invalid credentials.</span>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1" for="email">Email address</label>
                <input id="email" type="email" placeholder="admin@hms.com"
                       class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/30 focus:border-sky-400 transition-all"/>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1" for="password">Password</label>
                <div class="relative">
                    <input id="password" type="password" placeholder="••••••••"
                           class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/30 focus:border-sky-400 transition-all pr-10"/>
                    <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                        <span class="material-symbols-outlined text-xl" id="pwd-eye">visibility_off</span>
                    </button>
                </div>
            </div>

            <button id="login-btn" onclick="doLogin()"
                    class="w-full py-3 bg-sky-600 hover:bg-sky-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-sky-600/25 active:scale-95 text-sm mt-2">
                Sign In
            </button>
        </div>

        <p class="text-center text-xs text-slate-400 mt-6">
            Capgemini HMS &copy; 2026 — All rights reserved
        </p>
    </div>
</div>

<script>
    // If already logged in, redirect to dashboard
    if (localStorage.getItem('hms_accessToken')) window.location.href = '/home';

    function togglePwd() {
        const inp = document.getElementById('password');
        const eye = document.getElementById('pwd-eye');
        inp.type = inp.type === 'password' ? 'text' : 'password';
        eye.textContent = inp.type === 'password' ? 'visibility_off' : 'visibility';
    }

    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    async function doLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        const banner = document.getElementById('error-banner');
        const errText = document.getElementById('error-text');

        if (!email || !password) {
            showErr('Please enter your email and password.'); return;
        }

        btn.disabled = true;
        btn.textContent = 'Signing in…';
        banner.classList.add('hidden');

        try {
            const res = await fetch('/api/v1/auth/signin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const body = await res.json();

            if (!res.ok) {
                showErr(body.message || 'Invalid credentials.'); return;
            }

            // Store tokens and user data from response
            const data = body.data;
            localStorage.setItem('hms_accessToken', data.accessToken);
            localStorage.setItem('hms_refreshToken', data.refreshToken);
            localStorage.setItem('hms_tokenType', data.tokenType || 'Bearer');
            localStorage.setItem('hms_user', JSON.stringify({
                id: data.id,
                username: data.username,
                email: data.email,
                roles: data.roles
            }));

            // Redirect to dashboard/home
            const token = localStorage.getItem('hms_accessToken');
            if (token && token !== 'null' && token !== 'undefined') {
                console.log("Token found, redirecting to home...");
                window.location.href = '/home';
            }
        } catch (e) {
            showErr('Could not reach the server. Is the backend running on port 8081?');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }

    function showErr(msg) {
        document.getElementById('error-text').textContent = msg;
        document.getElementById('error-banner').classList.remove('hidden');
    }
</script>
</body>
</html>
