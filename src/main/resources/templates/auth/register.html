<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — Clinical Precision HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align: middle; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-blue-50 flex items-center justify-center p-4">

<div class="w-full max-w-lg">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-600 text-white mb-4 shadow-lg shadow-indigo-600/30">
            <span class="material-symbols-outlined text-2xl">person_add</span>
        </div>
        <h1 class="text-2xl font-extrabold text-slate-900 font-headline">Join Clinical Precision</h1>
        <p class="text-slate-500 mt-1 text-sm">Create your healthcare professional account</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl shadow-indigo-900/5 p-8 border border-slate-100">
        <div id="error-banner" class="hidden mb-6 p-4 bg-error-container/20 border border-error/10 rounded-xl text-error text-sm flex items-start gap-3">
            <span class="material-symbols-outlined text-sm mt-0.5">error</span>
            <span id="error-text">Account creation failed.</span>
        </div>

        <div class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Username *</label>
                    <input id="username" type="text" placeholder="jdoe24"
                           class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-100 text-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all"/>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Email *</label>
                    <input id="email" type="email" placeholder="john@example.com"
                           class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-100 text-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all"/>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Password *</label>
                <input id="password" type="password" placeholder="••••••••••••"
                       class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-100 text-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all"/>
                <p class="text-[10px] text-slate-400 mt-2 italic px-1">Must be at least 6 characters including numbers and letters.</p>
            </div>

            <div class="pt-2">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 italic">Account Role</label>
                <div class="grid grid-cols-4 gap-2">
                    <label class="role-chip">
                        <input type="radio" name="role" value="ADMIN" onclick="syncIdLabel()" class="hidden peer"/>
                        <span class="flex items-center justify-center p-2 rounded-xl border border-slate-100 bg-slate-50 text-[10px] font-bold text-slate-500 peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 cursor-pointer transition-all">ADMIN</span>
                    </label>
                    <label class="role-chip">
                        <input type="radio" name="role" value="DOCTOR" checked onclick="syncIdLabel()" class="hidden peer"/>
                        <span class="flex items-center justify-center p-2 rounded-xl border border-slate-100 bg-slate-50 text-[10px] font-bold text-slate-500 peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 cursor-pointer transition-all">DOCTOR</span>
                    </label>
                    <label class="role-chip">
                        <input type="radio" name="role" value="NURSE" onclick="syncIdLabel()" class="hidden peer"/>
                        <span class="flex items-center justify-center p-2 rounded-xl border border-slate-100 bg-slate-50 text-[10px] font-bold text-slate-500 peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 cursor-pointer transition-all">NURSE</span>
                    </label>
                     <label class="role-chip">
                        <input type="radio" name="role" value="PATIENT" onclick="syncIdLabel()" class="hidden peer"/>
                        <span class="flex items-center justify-center p-2 rounded-xl border border-slate-100 bg-slate-50 text-[10px] font-bold text-slate-500 peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 cursor-pointer transition-all">PATIENT</span>
                    </label>
                </div>
            </div>

            <div id="id-container">
                <label id="id-label" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Staff ID (Required) *</label>
                <input id="clinicalId" type="number" placeholder="101"
                       class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-100 text-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all"/>
            </div>

            <button id="reg-btn" onclick="doRegister()"
                    class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl transition-all shadow-lg shadow-indigo-600/25 active:scale-95 text-sm mt-4">
                Initialize Account
            </button>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-50 text-center">
            <p class="text-sm text-slate-500">Already have an account? 
                <a href="/login" class="text-indigo-600 font-bold hover:underline">Log in here</a>
            </p>
        </div>
    </div>
</div>

<script>
    function syncIdLabel() {
        const role = document.querySelector('input[name="role"]:checked').value;
        const box = document.getElementById('id-container');
        const label = document.getElementById('id-label');
        const input = document.getElementById('clinicalId');
        
        if (role === 'ADMIN') {
            box.classList.add('hidden');
        } else {
            box.classList.remove('hidden');
            label.textContent = role === 'PATIENT' ? 'Patient SSN (Required) *' : 'Staff ID (Required) *';
            input.placeholder = role === 'PATIENT' ? '100000001' : (role === 'DOCTOR' ? '101' : '501');
        }
    }

    async function doRegister() {
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const role = document.querySelector('input[name="role"]:checked').value;
        const clinicalId = document.getElementById('clinicalId').value;
        const btn = document.getElementById('reg-btn');
        const banner = document.getElementById('error-banner');

        if (!username || !email || !password || (role !== 'ADMIN' && !clinicalId)) {
            showErr('All clinical identifiers and authentication fields are mandatory.'); return;
        }

        btn.disabled = true;
        btn.textContent = 'Registering…';
        banner.classList.add('hidden');

        const payload = { 
            username, email, password, 
            role: [role] 
        };
        
        if (role === 'PATIENT') {
            payload.patientSsn = parseInt(clinicalId);
        } else if (role !== 'ADMIN') {
            payload.staffId = parseInt(clinicalId);
        }

        try {
            const res = await fetch('/api/v1/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const body = await res.json();

            if (!res.ok) {
                showErr(body.message || 'Registration failed.'); return;
            }

            // Success: redirect to login with a message (could use query params but let's just go)
            alert('Registration successful! You can now log in.');
            window.location.href = '/login';
        } catch (e) {
            showErr('Could not link to health registry. Check your connection.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Initialize Account';
        }
    }

    function showErr(msg) {
        document.getElementById('error-text').textContent = msg;
        document.getElementById('error-banner').classList.remove('hidden');
    }
</script>
</body>
</html>
