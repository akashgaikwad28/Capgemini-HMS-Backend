<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — Clinical Precision HMS</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script id="tailwind-config">
          tailwind.config = {
            theme: {
              extend: {
                colors: {
                  primary: "#006397",
                  "primary-container": "#3498db",
                  surface: "#f8f9fa",
                  "on-surface": "#191c1d",
                  outline: "#707881",
                  error: "#ba1a1a",
                },
                fontFamily: {
                  headline: ["Manrope"],
                  body: ["Inter"]
                }
              }
            }
          }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align: middle; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-50 via-white to-blue-50 flex items-center justify-center p-4 py-12">

<div class="w-full max-w-lg">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary text-white mb-4 shadow-lg shadow-primary/30">
            <span class="material-symbols-outlined text-2xl">person_add</span>
        </div>
        <h1 class="text-2xl font-extrabold text-sky-900 font-headline">Join Clinical Precision</h1>
        <p class="text-slate-500 mt-1 text-sm font-medium">Create your professional healthcare account</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl shadow-sky-900/5 p-8 border border-slate-100">
        <div id="error-banner" class="hidden mb-6 p-4 bg-red-50 border border-red-100 rounded-xl text-error text-sm flex items-start gap-3">
            <span class="material-symbols-outlined text-sm mt-0.5">error</span>
            <span id="error-text">Account creation failed.</span>
        </div>

        <div class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="relative group">
                    <input id="username" type="text" placeholder=" "
                           class="peer block w-full px-4 pt-6 pb-2 bg-slate-50 rounded-xl border border-transparent text-sm focus:bg-white focus:ring-4 focus:ring-primary/10 focus:border-primary/30 transition-all outline-none" required/>
                    <label class="absolute left-4 top-4 text-outline duration-150 transform -translate-y-3 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-primary pointer-events-none font-bold text-[10px] uppercase tracking-wider">Username *</label>
                </div>
                <div class="relative group">
                    <input id="email" type="email" placeholder=" "
                           class="peer block w-full px-4 pt-6 pb-2 bg-slate-50 rounded-xl border border-transparent text-sm focus:bg-white focus:ring-4 focus:ring-primary/10 focus:border-primary/30 transition-all outline-none" required/>
                    <label class="absolute left-4 top-4 text-outline duration-150 transform -translate-y-3 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-primary pointer-events-none font-bold text-[10px] uppercase tracking-wider">Email *</label>
                </div>
            </div>

            <div class="relative group">
                <input id="password" type="password" placeholder=" "
                       class="peer block w-full px-4 pt-6 pb-2 bg-slate-50 rounded-xl border border-transparent text-sm focus:bg-white focus:ring-4 focus:ring-primary/10 focus:border-primary/30 transition-all outline-none" required/>
                <label class="absolute left-4 top-4 text-outline duration-150 transform -translate-y-3 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-primary pointer-events-none font-bold text-[10px] uppercase tracking-wider">Password *</label>
                <p class="text-[10px] text-slate-400 mt-2 italic px-1">Min. 6 chars (letters & numbers).</p>
            </div>

            <div class="pt-2">
                <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-2 px-1">Identity Role</label>
                <div class="grid grid-cols-4 gap-2">
                    <label class="cursor-pointer">
                        <input type="radio" name="role" value="ADMIN" onclick="syncIdLabel()" class="hidden peer"/>
                        <span class="flex items-center justify-center p-2.5 rounded-xl border border-slate-100 bg-slate-50 text-[10px] font-bold text-slate-500 peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-all uppercase">Admin</span>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="role" value="DOCTOR" checked onclick="syncIdLabel()" class="hidden peer"/>
                        <span class="flex items-center justify-center p-2.5 rounded-xl border border-slate-100 bg-slate-50 text-[10px] font-bold text-slate-500 peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-all uppercase">Doctor</span>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="role" value="NURSE" onclick="syncIdLabel()" class="hidden peer"/>
                        <span class="flex items-center justify-center p-2.5 rounded-xl border border-slate-100 bg-slate-50 text-[10px] font-bold text-slate-500 peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-all uppercase">Nurse</span>
                    </label>
                     <label class="cursor-pointer">
                        <input type="radio" name="role" value="PATIENT" onclick="syncIdLabel()" class="hidden peer"/>
                        <span class="flex items-center justify-center p-2.5 rounded-xl border border-slate-100 bg-slate-50 text-[10px] font-bold text-slate-500 peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-all uppercase">Patient</span>
                    </label>
                </div>
            </div>

            <div id="id-container" class="relative group">
                <input id="clinicalId" type="number" placeholder=" "
                       class="peer block w-full px-4 pt-6 pb-2 bg-slate-50 rounded-xl border border-transparent text-sm focus:bg-white focus:ring-4 focus:ring-primary/10 focus:border-primary/30 transition-all outline-none"/>
                <label id="id-label" class="absolute left-4 top-4 text-outline duration-150 transform -translate-y-3 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-primary pointer-events-none font-bold text-[10px] uppercase tracking-wider">Staff ID *</label>
            </div>

            <button id="reg-btn" onclick="doRegister()"
                    class="w-full py-4 bg-primary hover:bg-sky-700 text-white font-bold rounded-2xl transition-all shadow-lg shadow-primary/25 active:scale-95 text-sm mt-4 flex items-center justify-center gap-2">
                <span>Initialize Account</span>
                <span class="material-symbols-outlined text-lg">how_to_reg</span>
            </button>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-50 text-center">
            <p class="text-sm text-slate-500 font-medium">Already have an account? 
                <a th:href="@{/login}" class="text-primary font-bold hover:underline">Log in here</a>
            </p>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="/js/main.js"></script>
<script>
    function syncIdLabel() {
        const role = document.querySelector('input[name="role"]:checked').value;
        const box = document.getElementById('id-container');
        const label = document.getElementById('id-label');
        const input = document.getElementById('clinicalId');
        
        if (role === 'ADMIN') {
            box.classList.add('hidden');
        } else {
            box.classList.remove('hidden');
            label.textContent = role === 'PATIENT' ? 'Patient SSN (Required) *' : 'Staff ID (Required) *';
            input.placeholder = role === 'PATIENT' ? '100000001' : (role === 'DOCTOR' ? '101' : '501');
        }
    }

    async function doRegister() {
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const role = document.querySelector('input[name="role"]:checked').value;
        const clinicalId = document.getElementById('clinicalId').value;
        const btn = document.getElementById('reg-btn');
        const banner = document.getElementById('error-banner');

        if (!username || !email || !password || (role !== 'ADMIN' && !clinicalId)) {
            showErr('All clinical identifiers and authentication fields are mandatory.'); return;
        }

        btn.disabled = true;
        btn.textContent = 'Registering…';
        banner.classList.add('hidden');

        const payload = { 
            username, email, password, 
            role: [role] 
        };
        
        if (role === 'PATIENT') {
            payload.patientSsn = parseInt(clinicalId);
        } else if (role !== 'ADMIN') {
            payload.staffId = parseInt(clinicalId);
        }

        try {
            // Using shared apiFetch which handles CSRF and error alerts
            const res = await apiFetch('/api/v1/auth/signup', {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            if (res && (res.success || res.status === 'success')) {
                alert('Registration successful! You can now log in.');
                window.location.href = '/login';
            } else if (res) {
                showErr(res.message || 'Registration failed.');
            }
        } catch (e) {
            showErr('Connection error. Please try again later.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Initialize Account';
        }
    }

    function showErr(msg) {
        document.getElementById('error-text').textContent = msg;
        document.getElementById('error-banner').classList.remove('hidden');
    }
    
    // Initial sync
    syncIdLabel();
</script>
</body>
</html>
