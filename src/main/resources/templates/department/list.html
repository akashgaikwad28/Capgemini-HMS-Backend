<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Departments — HMS</title></head>
<body>
<section class="p-8 min-h-screen">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h2 class="text-3xl font-extrabold tracking-tight text-on-surface font-headline">Departments</h2>
            <p class="text-on-surface-variant mt-1">Manage hospital departments, heads, and physician affiliations.</p>
        </div>
        <div class="flex gap-2">
            <button onclick="openAffiliateModal()" data-admin-only class="inline-flex items-center gap-2 px-4 py-3 bg-surface-container text-on-surface font-semibold rounded-xl hover:bg-surface-container-high text-sm border border-outline-variant/30">
                <span class="material-symbols-outlined text-base">link</span> Affiliate Physician
            </button>
            <button onclick="openModal()" data-admin-only class="inline-flex items-center gap-2 px-5 py-3 bg-primary text-white font-semibold rounded-xl hover:bg-sky-700 transition-all active:scale-95 shadow-lg shadow-primary/20 text-sm">
                <span class="material-symbols-outlined">add</span> Add Department
            </button>
        </div>
    </div>

    <!-- Cards Grid -->
    <div id="dept-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
        <div class="bg-surface-container-lowest rounded-xl p-6 animate-pulse"><div class="h-5 bg-slate-200 rounded w-1/2 mb-3"></div><div class="h-3 bg-slate-200 rounded w-3/4"></div></div>
        <div class="bg-surface-container-lowest rounded-xl p-6 animate-pulse"><div class="h-5 bg-slate-200 rounded w-1/2 mb-3"></div><div class="h-3 bg-slate-200 rounded w-3/4"></div></div>
        <div class="bg-surface-container-lowest rounded-xl p-6 animate-pulse"><div class="h-5 bg-slate-200 rounded w-1/2 mb-3"></div><div class="h-3 bg-slate-200 rounded w-3/4"></div></div>
    </div>

    <!-- Add/Edit Dept Modal -->
    <div id="modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/20 backdrop-blur-sm">
        <div class="bg-surface-container-lowest w-full max-w-md rounded-2xl shadow-2xl p-8 m-4">
            <div class="flex justify-between items-start mb-6">
                <h3 class="text-xl font-extrabold text-on-surface font-headline" id="modal-title">Add Department</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-surface-container-low rounded-full"><span class="material-symbols-outlined text-outline">close</span></button>
            </div>
            <input type="hidden" id="f-id-hidden"/>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-semibold text-outline uppercase tracking-wider">Dept ID *</label>
                        <input id="f-id" type="number" placeholder="1" class="field-input mt-1"/>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-outline uppercase tracking-wider">Head Physician</label>
                        <select id="f-head" class="field-input mt-1">
                            <option value="">— Unassigned —</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-semibold text-outline uppercase tracking-wider">Department Name *</label>
                    <input id="f-name" type="text" placeholder="General Medicine" class="field-input mt-1"/>
                </div>
                <div id="modal-err" class="hidden text-error text-sm bg-error-container rounded-lg px-3 py-2"></div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeModal()" class="flex-1 py-3 bg-surface-container-high text-on-surface-variant font-bold rounded-xl text-sm">Cancel</button>
                    <button onclick="saveDept()" id="save-btn" class="flex-[2] py-3 bg-primary text-white font-bold rounded-xl hover:bg-sky-700 active:scale-95 text-sm shadow-lg shadow-primary/20">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Affiliate Modal -->
    <div id="aff-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/20 backdrop-blur-sm">
        <div class="bg-surface-container-lowest w-full max-w-md rounded-2xl shadow-2xl p-8 m-4">
            <div class="flex justify-between items-start mb-6">
                <h3 class="text-xl font-extrabold text-on-surface font-headline">Affiliate Physician to Department</h3>
                <button onclick="closeAffModal()" class="p-2 hover:bg-surface-container-low rounded-full"><span class="material-symbols-outlined text-outline">close</span></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-semibold text-outline uppercase tracking-wider">Physician *</label>
                    <select id="aff-pid" class="field-input mt-1">
                        <option value="">— Select Physician —</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-semibold text-outline uppercase tracking-wider">Department ID *</label>
                    <input id="aff-did" type="number" placeholder="1" class="field-input mt-1"/>
                </div>
                <div class="flex items-center gap-3">
                    <input id="aff-primary" type="checkbox" class="w-4 h-4 rounded accent-primary"/>
                    <label for="aff-primary" class="text-sm font-medium text-on-surface">Primary Affiliation</label>
                </div>
                <div id="aff-err" class="hidden text-error text-sm bg-error-container rounded-lg px-3 py-2"></div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeAffModal()" class="flex-1 py-3 bg-surface-container-high text-on-surface-variant font-bold rounded-xl text-sm">Cancel</button>
                    <button onclick="saveAffiliation()" class="flex-[2] py-3 bg-primary text-white font-bold rounded-xl hover:bg-sky-700 active:scale-95 text-sm shadow-lg shadow-primary/20">Affiliate</button>
                </div>
            </div>
        </div>
    </div>

    <style>
    .field-input { display:block; width:100%; padding:0.6rem 0.875rem; background:#f3f4f5; border:none; border-radius:0.75rem; font-size:0.875rem; outline:none; }
    .field-input:focus { background:#fff; box-shadow:0 0 0 2px rgba(0,99,151,0.15); }
    </style>

    <script>
let editMode = false, deptList = [];

async function loadDepartments() {
    const grid = document.getElementById('dept-grid');
    try {
        const res = await apiFetch('/api/v1/departments?page=0&size=50');
        if (!res || !res.data) return;
        const data = res.data;
        deptList = data.content || [];
        if (!deptList.length) { grid.innerHTML = '<p class="text-outline text-sm col-span-3">No departments found.</p>'; return; }
        grid.innerHTML = deptList.map(d =>
            '<div class="bg-surface-container-lowest rounded-xl p-6 shadow-sm border border-outline-variant/10 hover:shadow-md transition-shadow">' +
                '<div class="flex justify-between items-start mb-4">' +
                    '<div>' +
                        '<span class="text-xs font-bold text-primary bg-primary-fixed px-2 py-0.5 rounded-full mb-2 inline-block">DEPT #' + d.departmentId + '</span>' +
                        '<h3 class="text-lg font-bold text-on-surface font-headline">' + d.name + '</h3>' +
                    '</div>' +
                    '<div class="flex gap-1">' +
                        '<button onclick="openEditDept(' + d.departmentId + ')" data-admin-only class="p-1.5 hover:bg-primary-fixed/30 rounded-lg text-primary"><span class="material-symbols-outlined text-base">edit</span></button>' +
                        '<button onclick="deleteDept(' + d.departmentId + ')" data-admin-only class="p-1.5 hover:bg-error-container rounded-lg text-error"><span class="material-symbols-outlined text-base">delete</span></button>' +
                    '</div>' +
                '</div>' +
                '<p class="text-sm text-on-surface-variant"><span class="font-semibold">Head ID:</span> ' + (d.headId || 'Unassigned') + '</p>' +
                '<button onclick="viewPhysicians(' + d.departmentId + ')" class="mt-3 text-xs text-primary font-semibold hover:underline flex items-center gap-1">' +
                    '<span class="material-symbols-outlined text-base">groups</span> View Affiliated Physicians' +
                '</button>' +
            '</div>').join('');
        applyRoleVisibility();
    } catch(e) { console.error(e); }
}

async function viewPhysicians(deptId) {
    const res = await apiFetch('/api/v1/departments/' + deptId + '/physicians');
    if (!res || !res.data) return;
    const ids = res.data;
    alert('Physician IDs in Dept #' + deptId + ':\n' + (ids.length ? ids.join(', ') : 'None affiliated'));
}

function openModal() {
    editMode = false;
    document.getElementById('modal-title').textContent = 'Add Department';
    document.getElementById('save-btn').textContent = 'Save';
    ['f-id','f-name','f-head'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-id').disabled = false;
    document.getElementById('modal-err').classList.add('hidden');
    document.getElementById('modal').classList.replace('hidden','flex');
}

function openEditDept(deptId) {
    var d = deptList.find(x => x.departmentId === deptId);
    if (!d) return;
    editMode = true;
    document.getElementById('modal-title').textContent = 'Edit Department';
    document.getElementById('save-btn').textContent = 'Update';
    document.getElementById('f-id').value = d.departmentId; document.getElementById('f-id').disabled = true;
    document.getElementById('f-id-hidden').value = d.departmentId;
    document.getElementById('f-name').value = d.name;
    document.getElementById('f-head').value = d.headId || '';
    document.getElementById('modal-err').classList.add('hidden');
    document.getElementById('modal').classList.replace('hidden','flex');
}

function closeModal() { document.getElementById('modal').classList.replace('flex','hidden'); }

async function saveDept() {
    const errEl = document.getElementById('modal-err'); errEl.classList.add('hidden');
    const id = editMode ? parseInt(document.getElementById('f-id-hidden').value) : parseInt(document.getElementById('f-id').value);
    const payload = { departmentId: id, name: document.getElementById('f-name').value.trim(), headId: document.getElementById('f-head').value ? parseInt(document.getElementById('f-head').value) : null };
    if (!payload.departmentId || !payload.name) { errEl.textContent = 'ID and Name are required.'; errEl.classList.remove('hidden'); return; }
    const btn = document.getElementById('save-btn'); btn.disabled = true;
    try {
        const res = await apiFetch(editMode ? '/api/v1/departments/' + id : '/api/v1/departments', { method: editMode ? 'PUT' : 'POST', body: JSON.stringify(payload) });
        if (!res) return;
        if (!res.success) { errEl.textContent = res.message || 'Error.'; errEl.classList.remove('hidden'); return; }
        showToast(editMode ? 'Department updated!' : 'Department created!');
        closeModal(); loadDepartments();
    } catch(e) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
    finally { btn.disabled = false; }
}

async function deleteDept(id) {
    confirmAction('Delete department #' + id + '?', async () => {
        const res = await apiFetch('/api/v1/departments/' + id, { method: 'DELETE' });
        if (res && res.success) { showToast('Department deleted.'); loadDepartments(); }
    });
}

function openAffiliateModal() { document.getElementById('aff-modal').classList.replace('hidden','flex'); }
function closeAffModal() { document.getElementById('aff-modal').classList.replace('flex','hidden'); }

async function saveAffiliation() {
    const errEl = document.getElementById('aff-err'); errEl.classList.add('hidden');
    const payload = { physicianId: parseInt(document.getElementById('aff-pid').value), departmentId: parseInt(document.getElementById('aff-did').value), primary: document.getElementById('aff-primary').checked };
    if (!payload.physicianId || !payload.departmentId) { errEl.textContent = 'Physician ID and Department ID required.'; errEl.classList.remove('hidden'); return; }
    const res = await apiFetch('/api/v1/departments/affiliate', { method: 'POST', body: JSON.stringify(payload) });
    if (!res) return;
    if (!res.success) { errEl.textContent = res.message || 'Error.'; errEl.classList.remove('hidden'); return; }
    showToast('Physician affiliated!');
    closeAffModal();
}

applyRoleVisibility();
loadDepartments();
buildPhysicianDropdown('f-head', true);
buildPhysicianDropdown('aff-pid');
    </script>
</section>
