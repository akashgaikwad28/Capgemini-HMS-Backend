<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title th:replace="${title}">Clinical Precision | HMS Dashboard</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                "colors": {
                        "secondary-fixed-dim": "#abcae8",
                        "secondary-container": "#c1e0ff",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#004b73",
                        "on-primary-container": "#002d47",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#001d31",
                        "on-secondary-container": "#46647e",
                        "surface-container-high": "#e7e8e9",
                        "tertiary-fixed-dim": "#ffba4b",
                        "on-secondary-fixed": "#001d31",
                        "on-tertiary-container": "#3c2500",
                        "inverse-surface": "#2e3132",
                        "on-tertiary-fixed-variant": "#624000",
                        "on-surface": "#191c1d",
                        "primary": "#006397",
                        "surface-variant": "#e1e3e4",
                        "on-surface-variant": "#3f4850",
                        "background": "#f8f9fa",
                        "tertiary-fixed": "#ffddb1",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "secondary-fixed": "#cce5ff",
                        "inverse-primary": "#92ccff",
                        "surface": "#f8f9fa",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#291800",
                        "surface-container-low": "#f3f4f5",
                        "on-error": "#ffffff",
                        "secondary": "#43617c",
                        "error": "#ba1a1a",
                        "on-background": "#191c1d",
                        "surface-tint": "#006397",
                        "outline-variant": "#bfc7d2",
                        "outline": "#707881",
                        "inverse-on-surface": "#f0f1f2",
                        "on-error-container": "#93000a",
                        "primary-container": "#3498db",
                        "tertiary": "#815600",
                        "tertiary-container": "#c48400",
                        "surface-dim": "#d9dadb",
                        "on-secondary-fixed-variant": "#2b4a63",
                        "primary-fixed": "#cce5ff",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container": "#edeeef",
                        "primary-fixed-dim": "#92ccff",
                        "on-tertiary": "#ffffff"
                },
                "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                },
                "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                }
              },
            },
          }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .display-lg, .font-headline { font-family: 'Manrope', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
        .skeleton-shimmer {
            background: linear-gradient(90deg, #f3f4f5 25%, #e7e8e9 50%, #f3f4f5 75%);
            background-size: 200% 100%;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">

    <!-- SideNavBar Shell -->
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <!-- Main Content Area -->
    <main class="ml-64 min-h-screen">
        <!-- TopNavBar Shell -->
        <header th:replace="~{fragments/header :: header}"></header>

        <!-- Dynamic Page Content -->
        <div th:replace="${content}">
            <!-- Page content will be injected here -->
        </div>
    </main>

    <!-- Custom App JS -->
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
