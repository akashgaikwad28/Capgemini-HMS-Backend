<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Procedures — HMS</title></head>
<body>
<section class="p-8 min-h-screen">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h2 class="text-3xl font-extrabold tracking-tight text-on-surface font-headline">Procedures</h2>
            <p class="text-on-surface-variant mt-1">Manage the hospital's medical procedure catalog and pricing.</p>
        </div>
        <button onclick="openModal()" class="inline-flex items-center gap-2 px-5 py-3 bg-primary text-white font-semibold rounded-xl hover:bg-sky-700 transition-all active:scale-95 shadow-lg shadow-primary/20 text-sm">
            <span class="material-symbols-outlined">add</span> Add Procedure
        </button>
    </div>

    <!-- Search -->
    <div class="flex gap-3 mb-6">
        <div class="relative flex-1 max-w-sm">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl">search</span>
            <input id="search-input" type="text" placeholder="Search by procedure name…"
                   class="w-full pl-10 pr-4 py-2.5 bg-surface-container-lowest border border-outline-variant/30 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20"/>
        </div>
        <button onclick="doSearch()" class="px-4 py-2.5 bg-surface-container text-on-surface text-sm font-medium rounded-xl hover:bg-surface-container-high">Search</button>
        <button onclick="loadProcedures(0)" class="px-4 py-2.5 bg-surface-container text-on-surface text-sm font-medium rounded-xl hover:bg-surface-container-high">Reset</button>
    </div>

    <!-- Table -->
    <div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-surface-container-low/50">
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Code</th>
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Procedure Name</th>
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Cost</th>
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody id="proc-tbody" class="divide-y divide-surface-container-low/50">
                    <tr><td colspan="4" class="px-6 py-8 text-center text-outline text-sm">Loading…</td></tr>
                </tbody>
            </table>
        </div>
        <div class="px-6 py-4 flex justify-between items-center border-t border-surface-container-low text-sm text-on-surface-variant">
            <span id="page-info">—</span>
            <div id="pager"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/20 backdrop-blur-sm">
        <div class="bg-surface-container-lowest w-full max-w-md rounded-2xl shadow-2xl p-8 m-4">
            <div class="flex justify-between items-start mb-6">
                <h3 class="text-xl font-extrabold text-on-surface font-headline" id="modal-title">Add Procedure</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-surface-container-low rounded-full"><span class="material-symbols-outlined text-outline">close</span></button>
            </div>
            <input type="hidden" id="f-code-hidden"/>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-semibold text-outline uppercase tracking-wider">Code *</label>
                        <input id="f-code" type="number" placeholder="1" class="field-input mt-1"/>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-outline uppercase tracking-wider">Cost ($) *</label>
                        <input id="f-cost" type="number" step="0.01" placeholder="1500.00" class="field-input mt-1"/>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-semibold text-outline uppercase tracking-wider">Procedure Name *</label>
                    <input id="f-name" type="text" placeholder="Appendectomy" class="field-input mt-1"/>
                </div>
                <div id="modal-err" class="hidden text-error text-sm bg-error-container rounded-lg px-3 py-2"></div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeModal()" class="flex-1 py-3 bg-surface-container-high text-on-surface-variant font-bold rounded-xl text-sm">Cancel</button>
                    <button onclick="saveProc()" id="save-btn" class="flex-[2] py-3 bg-primary text-white font-bold rounded-xl hover:bg-sky-700 active:scale-95 text-sm shadow-lg shadow-primary/20">Save</button>
                </div>
            </div>
        </div>
    </div>

    <style>
    .field-input { display:block; width:100%; padding:0.6rem 0.875rem; background:#f3f4f5; border:none; border-radius:0.75rem; font-size:0.875rem; outline:none; }
    .field-input:focus { background:#fff; box-shadow:0 0 0 2px rgba(0,99,151,0.15); }
    </style>

    <script>
    let currentPage = 0;
    let currentList = [];
    let editMode = false;

    async function loadProcedures(page) {
        currentPage = page;
        const tbody = document.getElementById('proc-tbody');
        tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-outline text-sm">Loading…</td></tr>';
        
        try {
            const res = await apiFetch('/api/v1/procedures?page=' + page + '&size=10&sort=code,asc');
            if (!res || !res.data) return;
            
            const data = res.data;
            currentList = data.content || [];
            
            document.getElementById('page-info').textContent = 'Page ' + (data.pageNo + 1) + ' of ' + data.totalPages + ' (' + data.totalElements + ' records)';
            buildPaginationControls('pager', data.totalPages, data.pageNo, 'loadProcedures');
            
            if (currentList.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-outline text-sm">No procedures found.</td></tr>'; 
            } else {
                tbody.innerHTML = currentList.map(p => 
                    '<tr class="hover:bg-primary-fixed/20 transition-colors">' +
                        '<td class="px-6 py-4 text-sm font-bold text-primary">#' + p.code + '</td>' +
                        '<td class="px-6 py-4 text-sm font-semibold text-on-surface">' + p.name + '</td>' +
                        '<td class="px-6 py-4 text-sm font-bold text-tertiary">$' + parseFloat(p.cost).toLocaleString('en-US', {minimumFractionDigits:2}) + '</td>' +
                        '<td class="px-6 py-4">' +
                            '<div class="flex gap-2">' +
                                '<button onclick="openEditById(' + p.code + ')" class="p-1.5 hover:bg-primary-fixed/30 rounded-lg text-primary"><span class="material-symbols-outlined text-lg">edit</span></button>' +
                                '<button onclick="deleteProc(' + p.code + ')" class="p-1.5 hover:bg-error-container rounded-lg text-error"><span class="material-symbols-outlined text-lg">delete</span></button>' +
                            '</div>' +
                        '</td>' +
                    '</tr>').join('');
            }
            applyRoleVisibility();
        } catch(e) { 
            console.error(e);
            tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-error text-sm">Failed to load: ' + e.message + '</td></tr>'; 
        }
    }

    function openEditById(code) {
        const p = currentList.find(x => x.code === code);
        if (!p) return;
        editMode = true;
        document.getElementById('modal-title').textContent = 'Edit Procedure';
        document.getElementById('save-btn').textContent = 'Update';
        document.getElementById('f-code').value = p.code; 
        document.getElementById('f-code').disabled = true;
        document.getElementById('f-code-hidden').value = p.code;
        document.getElementById('f-name').value = p.name;
        document.getElementById('f-cost').value = p.cost;
        document.getElementById('modal-err').classList.add('hidden');
        document.getElementById('modal').classList.replace('hidden','flex');
    }


    function openModal() {
        editMode = false;
        document.getElementById('modal-title').textContent = 'Add Procedure';
        document.getElementById('save-btn').textContent = 'Save';
        ['f-code','f-name','f-cost'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('f-code').disabled = false;
        document.getElementById('modal-err').classList.add('hidden');
        document.getElementById('modal').classList.replace('hidden','flex');
    }

    function closeModal() { document.getElementById('modal').classList.replace('flex','hidden'); }

    async function saveProc() {
        const errEl = document.getElementById('modal-err'); 
        errEl.classList.add('hidden');
        const code = editMode ? parseInt(document.getElementById('f-code-hidden').value) : parseInt(document.getElementById('f-code').value);
        const payload = { code, name: document.getElementById('f-name').value.trim(), cost: parseFloat(document.getElementById('f-cost').value) };
        if (!payload.code || !payload.name || isNaN(payload.cost)) { 
            errEl.textContent = 'All fields required.'; errEl.classList.remove('hidden'); return; 
        }
        const btn = document.getElementById('save-btn'); 
        btn.disabled = true;
        try {
            const res = await apiFetch(editMode ? '/api/v1/procedures/' + code : '/api/v1/procedures', { method: editMode ? 'PUT' : 'POST', body: JSON.stringify(payload) });
            if (res && res.success) {
                showToast(editMode ? 'Procedure updated!' : 'Procedure added!');
                closeModal(); loadProcedures(currentPage);
            } else if (res) {
                errEl.textContent = res.message || 'Error.';
                errEl.classList.remove('hidden');
            }
        } catch(e) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
        finally { btn.disabled = false; }
    }

    async function deleteProc(code) {
        confirmAction('Delete procedure #' + code + '?', async () => {
            const res = await apiFetch('/api/v1/procedures/' + code, { method: 'DELETE' });
            if (res && res.success) { showToast('Procedure deleted.'); loadProcedures(currentPage); }
        });
    }

    // Init
    loadProcedures(0);
    document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    </script>
</section>
