<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>404 — Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align: middle; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-8">
    <div class="text-center max-w-md">
        <div class="inline-flex items-center justify-center w-24 h-24 rounded-3xl bg-sky-100 text-sky-600 mb-6">
            <span class="material-symbols-outlined text-5xl">search_off</span>
        </div>
        <h1 class="text-6xl font-extrabold text-slate-800 font-headline mb-2">404</h1>
        <p class="text-xl font-semibold text-slate-600 font-headline mb-3">Page Not Found</p>
        <p class="text-slate-500 mb-8">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="inline-flex items-center gap-2 px-6 py-3 bg-sky-600 text-white font-semibold rounded-xl hover:bg-sky-700 transition-colors shadow-lg shadow-sky-600/25">
            <span class="material-symbols-outlined text-base">home</span> Back to Dashboard
        </a>
    </div>
</body>
</html>
