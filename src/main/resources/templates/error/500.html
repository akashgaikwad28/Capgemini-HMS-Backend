<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>500 — Server Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align: middle; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-8">
    <div class="text-center max-w-md">
        <div class="inline-flex items-center justify-center w-24 h-24 rounded-3xl bg-red-100 text-red-600 mb-6">
            <span class="material-symbols-outlined text-5xl">error</span>
        </div>
        <h1 class="text-6xl font-extrabold text-slate-800 font-headline mb-2">500</h1>
        <p class="text-xl font-semibold text-slate-600 font-headline mb-3">Internal Server Error</p>
        <p class="text-slate-500 mb-8">Something went wrong on our end. Please try again or contact your system administrator.</p>
        <div class="flex gap-3 justify-center">
            <button onclick="history.back()" class="inline-flex items-center gap-2 px-5 py-3 bg-slate-200 text-slate-700 font-semibold rounded-xl hover:bg-slate-300 transition-colors">
                <span class="material-symbols-outlined text-base">arrow_back</span> Go Back
            </button>
            <a href="/" class="inline-flex items-center gap-2 px-5 py-3 bg-sky-600 text-white font-semibold rounded-xl hover:bg-sky-700 transition-colors shadow-lg shadow-sky-600/25">
                <span class="material-symbols-outlined text-base">home</span> Dashboard
            </a>
        </div>
    </div>
</body>
</html>
